version: 2
updates:
  # Keep GitHub Actions pinned in ci.yml / release.yml current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  # Keep Python runtime and dev dependencies (pyproject.toml) current.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      python:
        patterns:
          - "*"
